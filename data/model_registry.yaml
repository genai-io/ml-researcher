# ============================================================
# TABULAR
# ============================================================

- id: PriorLabs/TabPFN
  task: tabular
  modality: tabular
  params: 7M (foundation; in-context)
  license: permissive
  min_data:
    fine_tune: 0  # in-context, no fine-tune needed
    linear_probe: 50
  recommended_hparams:
    n_ensembles: 32
    device: cuda
  pros:
    - "best small-sample tabular up to ~10K rows / 500 features"
    - "no hyperparameter tuning"
    - "calibrated probabilities by default"
  cons:
    - "hard size limits"
    - "synthetic-trained — may underperform on extreme distributions"
  failure_modes:
    - "very long-tail label distributions may mis-calibrate"
  sota_tracker: https://github.com/PriorLabs/TabArena
  reference_impl: https://github.com/PriorLabs/TabPFN
  last_verified: 2026-04-15

- id: xgboost
  task: tabular
  modality: tabular
  params: tree-based (no params)
  license: permissive (apache-2.0)
  min_data:
    fine_tune: 1000
  recommended_hparams:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    early_stopping_rounds: 50
  pros:
    - "default workhorse for medium-large tabular"
    - "ecosystem, GPU support, mature"
  cons:
    - "overfits at small N (< 200 rows) without careful CV"
  failure_modes:
    - "tuning on test set is the most common bug"
  sota_tracker: https://github.com/dmlc/xgboost
  reference_impl: https://xgboost.readthedocs.io/en/stable/python/python_intro.html
  last_verified: 2026-04-15

- id: catboost
  task: tabular
  modality: tabular
  params: tree-based
  license: permissive (apache-2.0)
  min_data:
    fine_tune: 1000
  recommended_hparams:
    iterations: 2000
    depth: 6
    learning_rate: 0.03
    early_stopping_rounds: 100
  pros:
    - "native categorical handling — no manual encoding"
    - "robust defaults"
  cons:
    - "slower training than LightGBM / XGBoost"
  failure_modes:
    - "high-cardinality categoricals can blow up training time"
  sota_tracker: https://github.com/catboost/benchmarks
  reference_impl: https://catboost.ai/docs/concepts/python-quickstart
  last_verified: 2026-04-15

