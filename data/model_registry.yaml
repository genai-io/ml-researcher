# ML Model Registry — ml-researcher
#
# Structured ML knowledge base, queried by skills/ml/model-recommend.md.
# Each entry has a `last_verified` date; entries older than 90 days
# are flagged stale by model-recommend.
#
# Schema (per entry):
#   id:                 HuggingFace Hub ID or canonical name
#   task:               primary task category
#   modality:           vision | text | audio | multimodal | tabular | timeseries
#   params:             approximate parameter count
#   license:            permissive | research-only | restricted
#   min_data:
#     fine_tune:        minimum samples for fine-tuning to be reasonable
#     linear_probe:     minimum samples for linear-probe to be reasonable (if applicable)
#   recommended_hparams: per-task starting points
#   pros:               list of strengths
#   cons:               list of weaknesses
#   failure_modes:      common ways to mess up
#   sota_tracker:       URL of an authoritative leaderboard / benchmark
#   reference_impl:     URL of a working training script
#   last_verified:      ISO date when this entry was last cross-checked

# ============================================================
# VISION — image classification, detection, segmentation
# ============================================================

- id: timm/vit_large_patch14_dinov2.lvd142m
  task: image_classification
  modality: vision
  params: 304M
  license: permissive (apache-2.0)
  min_data:
    fine_tune: 10000
    linear_probe: 100
  recommended_hparams:
    lr: 1e-4
    batch_size: 64
    epochs: 30
    optimizer: adamw
    weight_decay: 0.05
  pros:
    - "strong linear-probe with little data"
    - "robust to label noise"
    - "general visual representations across domains"
  cons:
    - "higher memory than CNN counterparts"
    - "slower at inference than smaller backbones"
  failure_modes:
    - "domain shift on medical / satellite / specialized imagery"
    - "long-tail classes need re-weighting"
  sota_tracker: https://paperswithcode.com/sota/image-classification-on-imagenet
  reference_impl: https://huggingface.co/docs/timm/training_script
  last_verified: 2026-04-15

